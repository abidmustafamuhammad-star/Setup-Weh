<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ReceOTP — Login</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0a;--card:#111;--border:#1e1e1e;--border2:#2a2a2a;
  --red:#e53e3e;--red2:#c53030;--red3:#feb2b2;--red-dim:#3d1515;
  --text:#f0f0f0;--muted:#888;--dim:#555;
  --neon-red:0 0 8px #e53e3e,0 0 20px #e53e3e44;
  --neon-glow:0 0 4px #e53e3e88;
  --font:'Segoe UI',system-ui,sans-serif;
  --r:10px;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden}
body{display:flex;align-items:center;justify-content:center;min-height:100vh;position:relative}

/* Animated bg grid */
.bg-grid{position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(#1a00004d 1px,transparent 1px),linear-gradient(90deg,#1a00004d 1px,transparent 1px);
  background-size:40px 40px;animation:gridMove 20s linear infinite}
@keyframes gridMove{0%{background-position:0 0}100%{background-position:40px 40px}}
.bg-glow{position:fixed;top:-30%;left:-20%;width:60%;height:60%;border-radius:50%;
  background:radial-gradient(circle,#e53e3e0d 0%,transparent 70%);pointer-events:none;z-index:0}
.bg-glow2{position:fixed;bottom:-30%;right:-20%;width:50%;height:50%;border-radius:50%;
  background:radial-gradient(circle,#7b000022 0%,transparent 70%);pointer-events:none;z-index:0}

.wrap{position:relative;z-index:1;width:100%;max-width:420px;padding:16px}
.logo{text-align:center;margin-bottom:28px}
.logo-icon{width:52px;height:52px;border-radius:14px;margin:0 auto 12px;
  background:linear-gradient(135deg,#e53e3e,#7b0000);
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--neon-red);}
.logo-icon svg{width:26px;height:26px;color:#fff}
.logo h1{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;color:#fff}
.logo h1 span{color:var(--red)}
.logo p{font-size:.82rem;color:var(--muted);margin-top:4px}

.card{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:28px;
  box-shadow:0 24px 60px #00000088,inset 0 1px 0 #ffffff08}

.tabs{display:flex;background:#0d0d0d;border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:22px;gap:3px}
.tab{flex:1;padding:8px;border:none;background:none;border-radius:6px;
  font-size:.85rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .2s;font-family:var(--font)}
.tab.active{background:var(--red);color:#fff;box-shadow:var(--neon-glow)}

.alert{padding:11px 14px;border-radius:8px;font-size:.82rem;font-weight:500;margin-bottom:16px;
  display:none;align-items:center;gap:8px;border-left:3px solid}
.alert.show{display:flex}
.alert-error{background:#1a0000;color:#fc8181;border-color:var(--red)}
.alert-success{background:#001a0a;color:#68d391;border-color:#38a169}
.alert svg{width:15px;height:15px;flex-shrink:0}

.form-group{margin-bottom:14px}
.form-label{display:block;font-size:.75rem;font-weight:600;color:#ccc;margin-bottom:5px;text-transform:uppercase;letter-spacing:.04em}
.inp-wrap{position:relative}
.inp-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--dim);display:flex;pointer-events:none}
.inp-icon svg{width:15px;height:15px}
.inp{width:100%;padding:10px 11px 10px 36px;background:#0d0d0d;border:1px solid var(--border2);
  border-radius:8px;color:var(--text);font-size:.875rem;font-family:var(--font);
  outline:none;transition:border-color .2s,box-shadow .2s}
.inp:focus{border-color:var(--red);box-shadow:0 0 0 3px #e53e3e22}
.inp::placeholder{color:var(--dim)}
.inp.no-icon{padding-left:11px}
.pass-btn{position:absolute;right:9px;top:50%;transform:translateY(-50%);
  background:none;border:none;cursor:pointer;color:var(--dim);display:flex;padding:3px}
.pass-btn:hover{color:var(--red)}
.pass-btn svg{width:15px;height:15px}

.strength-bar{display:flex;gap:3px;margin-top:5px}
.sb{height:3px;flex:1;border-radius:2px;background:var(--border2);transition:background .3s}
.sb.s1{background:var(--red)}
.sb.s2{background:#dd6b20}
.sb.s3{background:#d69e2e}
.sb.s4{background:#38a169}
.strength-txt{font-size:.68rem;color:var(--muted);margin-top:2px}

.remember{display:flex;align-items:center;gap:8px;margin-bottom:14px}
.chk{width:15px;height:15px;accent-color:var(--red);cursor:pointer}
.chk-label{font-size:.8rem;color:var(--muted);cursor:pointer}

.btn-submit{width:100%;padding:11px;border-radius:8px;border:none;
  background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;
  font-size:.9rem;font-weight:700;cursor:pointer;font-family:var(--font);
  display:flex;align-items:center;justify-content:center;gap:7px;
  transition:all .2s;box-shadow:var(--neon-glow);margin-top:4px}
.btn-submit:hover{box-shadow:var(--neon-red);transform:translateY(-1px)}
.btn-submit:disabled{opacity:.5;cursor:not-allowed;transform:none}

.spin{width:15px;height:15px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  body{align-items:flex-start;padding-top:40px}
  .wrap{max-width:100%;padding:12px}
  .card{padding:20px 16px}
}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow"></div>
<div class="bg-glow2"></div>
<div class="wrap">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
    </div>
    <h1>Nokos<span>OTP</span></h1>
    <p>Platform Virtual Number Premium</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="switchTab('login')">Masuk</button>
      <button class="tab" id="tab-reg" onclick="switchTab('reg')">Daftar</button>
    </div>
    <div class="alert alert-error" id="alert-err">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span id="alert-err-txt"></span>
    </div>
    <div class="alert alert-success" id="alert-ok">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
      <span id="alert-ok-txt"></span>
    </div>

    <!-- LOGIN -->
    <div id="form-login">
      <div class="form-group">
        <label class="form-label">Username / Email</label>
        <div class="inp-wrap">
          <span class="inp-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <input type="text" class="inp" id="l-login" placeholder="masukkan username atau email" autocomplete="username"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="inp-wrap">
          <span class="inp-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" class="inp" id="l-pass" placeholder="password kamu" autocomplete="current-password"/>
          <button class="pass-btn" type="button" onclick="togglePass('l-pass',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <div class="remember">
        <input type="checkbox" class="chk" id="remember"/>
        <label class="chk-label" for="remember">Ingat saya 7 hari</label>
      </div>
      <button class="btn-submit" id="btn-login" onclick="doLogin()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/></svg>
        Masuk
      </button>
    </div>

    <!-- REGISTER -->
    <div id="form-reg" style="display:none">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="inp-wrap">
          <span class="inp-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <input type="text" class="inp" id="r-user" placeholder="3-30 karakter: huruf kecil, angka, _" autocomplete="username"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <div class="inp-wrap">
          <span class="inp-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span>
          <input type="email" class="inp" id="r-email" placeholder="email@kamu.com" autocomplete="email"/>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="inp-wrap">
          <span class="inp-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" class="inp" id="r-pass" placeholder="min 8 karakter" oninput="checkStr(this.value)" autocomplete="new-password"/>
          <button class="pass-btn" type="button" onclick="togglePass('r-pass',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
        <div class="strength-bar"><div class="sb" id="sb1"></div><div class="sb" id="sb2"></div><div class="sb" id="sb3"></div><div class="sb" id="sb4"></div></div>
        <div class="strength-txt" id="str-txt"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Konfirmasi Password</label>
        <div class="inp-wrap">
          <span class="inp-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" class="inp" id="r-conf" placeholder="ulangi password" autocomplete="new-password"/>
          <button class="pass-btn" type="button" onclick="togglePass('r-conf',this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>
      <button class="btn-submit" id="btn-reg" onclick="doRegister()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
        Buat Akun
      </button>
    </div>
  </div>
</div>
<script>
(async()=>{
  try{const r=await fetch('/api/auth/me',{credentials:'include'});const d=await r.json();if(d.success){window.location.replace(d.user.role==='admin'?'/admin':'/dashboard')}}catch(e){}
})();

function switchTab(t){
  document.getElementById('form-login').style.display=t==='login'?'':'none';
  document.getElementById('form-reg').style.display=t==='reg'?'':'none';
  document.getElementById('tab-login').classList.toggle('active',t==='login');
  document.getElementById('tab-reg').classList.toggle('active',t==='reg');
  hideAlert();
}
function showAlert(type,msg){
  hideAlert();
  const el=document.getElementById(type==='err'?'alert-err':'alert-ok');
  document.getElementById(type==='err'?'alert-err-txt':'alert-ok-txt').textContent=msg;
  el.classList.add('show');
}
function hideAlert(){document.querySelectorAll('.alert').forEach(e=>e.classList.remove('show'))}
function togglePass(id,btn){
  const el=document.getElementById(id);
  el.type=el.type==='password'?'text':'password';
  btn.innerHTML=el.type==='text'
    ?`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.45 18.45 0 0 1-5.07 5.93m-9.58 2.92a3 3 0 1 1 4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`
    :`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`;
}
function checkStr(p){
  let s=0;
  if(p.length>=8)s++;if(/[A-Z]/.test(p))s++;if(/[0-9]/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;
  const labels=['','Lemah','Sedang','Kuat','Sangat Kuat'];
  const cls=['','s1','s2','s3','s4'];
  [1,2,3,4].forEach(i=>{const el=document.getElementById('sb'+i);el.className='sb'+(i<=s?' '+cls[s]:'')});
  document.getElementById('str-txt').textContent=s>0?labels[s]:'';
}
function setLoad(id,on){
  const b=document.getElementById(id);b.disabled=on;
  if(on){b._t=b.innerHTML;b.innerHTML='<div class="spin"></div>';}
  else if(b._t){b.innerHTML=b._t;}
}
async function doLogin(){
  const login=document.getElementById('l-login').value.trim();
  const password=document.getElementById('l-pass').value;
  const remember=document.getElementById('remember').checked;
  hideAlert();
  if(!login||!password){showAlert('err','Username/email dan password wajib diisi.');return;}
  setLoad('btn-login',true);
  try{
    const r=await fetch('/api/auth/login',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,password,remember})});
    const d=await r.json();
    if(d.success){showAlert('ok','Login berhasil! Mengalihkan...');setTimeout(()=>window.location.replace(d.user.role==='admin'?'/admin':'/dashboard'),800);}
    else showAlert('err',d.error||'Login gagal.');
  }catch(e){showAlert('err','Koneksi error. Coba lagi.');}
  setLoad('btn-login',false);
}
async function doRegister(){
  const username=document.getElementById('r-user').value.trim();
  const email=document.getElementById('r-email').value.trim();
  const password=document.getElementById('r-pass').value;
  const confirm=document.getElementById('r-conf').value;
  hideAlert();
  if(!username||!email||!password||!confirm){showAlert('err','Semua field wajib diisi.');return;}
  if(!/^[a-z0-9_]{3,30}$/.test(username)){showAlert('err','Username: 3-30 karakter huruf kecil, angka, underscore.');return;}
  if(password.length<8){showAlert('err','Password minimal 8 karakter.');return;}
  if(password!==confirm){showAlert('err','Password tidak cocok.');return;}
  setLoad('btn-reg',true);
  try{
    const r=await fetch('/api/auth/register',{method:'POST',credentials:'include',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});
    const d=await r.json();
    if(d.success){showAlert('ok',d.message||'Akun berhasil dibuat! Silakan login.');setTimeout(()=>switchTab('login'),1500);}
    else showAlert('err',d.error||'Pendaftaran gagal.');
  }catch(e){showAlert('err','Koneksi error. Coba lagi.');}
  setLoad('btn-reg',false);
}
document.addEventListener('keydown',e=>{
  if(e.key!=='Enter')return;
  const isLogin=document.getElementById('form-login').style.display!=='none';
  if(isLogin)doLogin();else doRegister();
});
</script>
</body>
</html>
